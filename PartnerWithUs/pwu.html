<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner with Us | TransitLK</title>
    <link rel="stylesheet" href="../Styles/style.css">
    <link rel="stylesheet" href="Styles/style.css">
</head>
<body>

    <nav>
        <div class="logo-container">
            <a href="../index.html"><img src="../Images/transitLKLogo.png" alt="TransitLK Logo" class="nav-logo"></a>
        </div>
        <div class="nav-links">
            <a href="../index.html" class="btn" style="padding: 0.6rem 1.5rem;">Back to Home</a>
        </div>
    </nav>

    <section class="contact-hero">
        <div class="contact-container">
            <h1>Partner with <span style="color: #96D46C;">TransitLK</span></h1>
            <p>Join us in building Sri Lanka's first unified mobility intelligence network.</p>
            
            <form class="contact-form">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="name@company.com" required>
                </div>
                
                <div class="input-group">
                    <label>Short Message</label>
                    <textarea rows="5" placeholder="Tell us how you'd like to collaborate..." required></textarea>
                </div>
                
                <button type="submit" class="btn">Send Proposal</button>
            </form>
        </div>
    </section>

    <footer>
    <div class="footer-content">
        <p>&copy; 2026 TransitLK by 
            <span class="footer-brand">
                <img src="../Images/vaylenLogo.jpg" alt="Vaylen Logo" class="footer-logo"> 
                Vaylen.
            </span>
        </p>
    </div>
    </footer>
</body>
</html>
