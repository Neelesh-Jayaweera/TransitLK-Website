<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner with Us | TransitLK</title>
    <link rel="stylesheet" href="../Styles/style.css">
    <link rel="stylesheet" href="Styles/style.css">
</head>
<body>

<nav>
    <div class="logo-container">
        <a href="../index.html"><img src="../Images/transitLKLogo.png" alt="TransitLK Logo" class="nav-logo"></a>
    </div>
    <a href="../index.html" class="nav-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back to Home
    </a>
</nav>

<section class="pwu-hero">
    <div class="pwu-container reveal">

        <div class="pwu-eyebrow">
            <span class="eyebrow-dot"></span>
            Partnerships &middot; TransitLK
        </div>

        <h1>Partner with <span class="accent">TransitLK</span></h1>
        <p>Join us in building Sri Lanka's first unified mobility intelligence network.</p>

        <div class="pwu-form">
            <form id="partnerForm">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@company.com" required>
            </div>

            <div class="input-group">
                <label for="message">Short Message</label>
                <textarea id="message" rows="5" placeholder="Tell us how you'd like to collaborate..." required></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                Send Proposal
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </button>

            <p id="formStatus" style="margin-top: 12px; font-size: 14px;"></p>
        </form>

            <div class="trust-row">
                <div class="trust-item">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    Confidential
                </div>
                <div class="trust-item">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    Fast Response
                </div>
                <div class="trust-item">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    No Commitment
                </div>
            </div>
        </div>

    </div>
</section>

<footer>
    <div class="footer-content">
        <p>&copy; 2026 TransitLK by
            <span class="footer-brand">
                <img src="../Images/vaylenLogo.jpg" alt="Vaylen Logo" class="footer-logo">
                Vaylen.
            </span>
        </p>
    </div>
</footer>
<script src="Scripts/script.js" defer></script>
</body>
</html>
